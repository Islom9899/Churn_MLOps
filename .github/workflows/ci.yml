# GitHub Actions CI — har push/PR da avtomat: o'rnatish -> trening -> test
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1) Repo kodi (DVC meta fayllar ham shu yerda: .dvc fayllar)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Python o'rnatish
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 3) Paketlarni o'rnatish
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure CI DVC remote
        run: |
          if [ -z "$DVC_REMOTE_URL" ]; then
            echo "::error::DVC_REMOTE_URL must be set to a CI-accessible DVC remote."
            exit 1
          fi
          dvc remote modify --local local_remote url "$DVC_REMOTE_URL"
        env:
          DVC_REMOTE_URL: ${{ secrets.DVC_REMOTE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.DVC_AWS_DEFAULT_REGION }}

      # 4) Trening ma'lumotini tayyorlash.
      #    Avval DVC pull urinib ko'riladi (cloud remote sozlangan bo'lsa ishlaydi).
      #    Agar remote yo'q bo'lsa — to'liq prepare.py orqali qayta yaratiladi.
      #    DATABASE_URL GitHub Secret sifatida saqlangan bo'lishi kerak.
      - name: Prepare training data
        run: |
          dvc pull data/training_dataset.csv || (
            dvc pull data/WA_Fn-UseC_-Telco-Customer-Churn.csv &&
            python -m src.data.prepare
          )
        env:
          DATABASE_URL: ${{ secrets['DATABASE_URL'] }}

      # 5) Prefect flow orqali model o'qitiladi + MLflow Registry ga ro'yxatga olinadi.
      #    PREFECT_API_URL yo'q bo'lsa — Prefect lokal rejimda ishlaydi (server shart emas).
      - name: Train model (Prefect flow)
        run: python -m src.pipeline.train_flow

      - name: Promote model to production alias
        run: python -m src.pipeline.promote_model

      # 6) Testlar
      - name: Run tests
        run: pytest
