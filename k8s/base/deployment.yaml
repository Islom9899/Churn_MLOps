apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-api
  namespace: churn-mlops
  labels:
    app.kubernetes.io/name: churn-api
    app.kubernetes.io/part-of: churn-mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: churn-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: churn-api
        app.kubernetes.io/part-of: churn-mlops
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: churn-api
          image: ghcr.io/islom9899/churn-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: MODEL_SOURCE
              value: registry
            - name: MLFLOW_MODEL_ALIAS
              value: production
            - name: ALLOW_LOCAL_MODEL_FALLBACK
              value: "false"
            - name: ENABLE_OTEL
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: churn-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc:4318
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: churn-api-secrets
                  key: DATABASE_URL
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: churn-api-secrets
                  key: MLFLOW_TRACKING_URI
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
